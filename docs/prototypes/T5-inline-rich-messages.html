<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>T5 原型 · 对话内富消息（漏洞卡 / 攻击链 / 审批 / 报告）</title>
<!--
  THROWAWAY PROTOTYPE for wayfinder ticket T5 (#6).
  Purpose: a concrete "react-to" artifact showing how the four inline rich-message
  types render in the single chat window (north-star #6: 成果全部内联对话流, 零跳转).
  Field names are GROUND TRUTH from the Go structs / real API contracts — not invented.
  This is NOT production code; it mocks the SSE stream with setTimeout + fake data.
-->
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --panel: #171a23; --panel-2: #1e222d; --line: #2a2f3a;
    --txt: #e6e8ee; --muted: #9aa3b2; --accent: #4f46e5; --accent-2: #6366f1;
    --crit: #ef4444; --high: #f97316; --med: #f59e0b; --low: #3b82f6; --info: #6b7280;
    --ok: #22c55e; --warn: #f59e0b; --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
    font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; }
  .app { max-width: 820px; margin: 0 auto; padding: 24px 16px 120px; }
  .banner { background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
    padding:12px 16px; margin-bottom:20px; color:var(--muted); font-size:13px; }
  .banner b { color:var(--txt); }
  .msg { display:flex; gap:12px; margin:18px 0; }
  .avatar { width:32px; height:32px; border-radius:8px; flex:0 0 32px; display:flex;
    align-items:center; justify-content:center; font-size:15px; }
  .avatar.user { background:#2b3350; }
  .avatar.assistant { background:var(--accent); }
  .msg-body { flex:1; min-width:0; }
  .bubble { background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; display:inline-block; max-width:100%; }
  .msg.user .msg-body { display:flex; justify-content:flex-end; }
  .msg.user .bubble { background:#26304d; }
  .who { font-size:12px; color:var(--muted); margin-bottom:4px; }

  /* ---- shared rich-card shell (design: .rich-card.rich-card-{type}) ---- */
  .rich-card { background:var(--panel); border:1px solid var(--line); border-radius:12px;
    margin-top:10px; overflow:hidden; }
  .rich-card .rc-head { display:flex; align-items:center; gap:10px; padding:11px 14px;
    cursor:pointer; user-select:none; }
  .rich-card .rc-head:hover { background:var(--panel-2); }
  .rc-title { font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rc-kicker { font-size:11px; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; }
  .rc-body { padding:0 14px 14px; border-top:1px solid var(--line); }
  .rc-body.collapsed { display:none; }
  .rc-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  .btn { border:1px solid var(--line); background:var(--panel-2); color:var(--txt);
    padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer; }
  .btn:hover { border-color:var(--accent-2); }
  .btn.primary { background:var(--accent); border-color:var(--accent); }
  .btn.ok { background:var(--ok); border-color:var(--ok); color:#08210f; font-weight:600; }
  .btn.danger { background:var(--danger); border-color:var(--danger); color:#2a0808; font-weight:600; }
  .btn.admin::after { content:" 🔒admin"; font-size:10px; opacity:.7; }
  .chip { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px;
    border:1px solid var(--line); color:var(--muted); }
  .kv { display:grid; grid-template-columns:96px 1fr; gap:4px 12px; margin-top:10px; font-size:13px; }
  .kv .k { color:var(--muted); }
  pre.code { background:#0b0d12; border:1px solid var(--line); border-radius:8px; padding:10px;
    overflow:auto; font:12px/1.5 "SF Mono",Menlo,Consolas,monospace; color:#c9d1e3; margin:8px 0 0; }
  .sev-bar { width:4px; align-self:stretch; border-radius:4px 0 0 4px; }
  .rich-card.with-bar { display:flex; }
  .rich-card.with-bar > .rc-main { flex:1; min-width:0; }
  .badge { font-size:11px; padding:2px 8px; border-radius:6px; font-weight:600; }
  .sev-critical{background:rgba(239,68,68,.16);color:var(--crit)} .bar-critical{background:var(--crit)}
  .sev-high{background:rgba(249,115,22,.16);color:var(--high)} .bar-high{background:var(--high)}
  .sev-medium{background:rgba(245,158,11,.16);color:var(--med)} .bar-medium{background:var(--med)}
  .sev-low{background:rgba(59,130,246,.16);color:var(--low)} .bar-low{background:var(--low)}
  .sev-info{background:rgba(107,114,128,.16);color:var(--info)} .bar-info{background:var(--info)}
  .status-badge{background:rgba(99,102,241,.16);color:var(--accent-2)}
  #cy { height:220px; background:#0b0d12; border-radius:8px; margin-top:12px; border:1px solid var(--line); }
  #cy.expanded { height:460px; }
  .hitl-note { font-size:12px; color:var(--muted); margin-top:8px; }
  textarea.args { width:100%; background:#0b0d12; color:#c9d1e3; border:1px solid var(--line);
    border-radius:8px; padding:8px; font:12px/1.5 "SF Mono",Menlo,monospace; min-height:80px; }
  .resolved { opacity:.75; }
  .resolved-tag { font-size:12px; font-weight:600; }
  .report-summary { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .report-stream { max-height:180px; overflow:auto; }
  .muted { color:var(--muted); }
  .sse-tag { font-family:"SF Mono",Menlo,monospace; font-size:11px; color:var(--accent-2);
    background:rgba(99,102,241,.1); padding:1px 6px; border-radius:5px; }
  h1 { font-size:18px; margin:0 0 6px; }
</style>
</head>
<body>
<div class="app">
  <div class="banner">
    <h1>T5 原型 · 对话内富消息</h1>
    这是 wayfinder <b>T5 (#6)</b> 的一次性原型：把「漏洞卡 / 攻击链 / HITL 审批 / 报告导出」四类成果
    <b>全部内联在同一个对话窗口</b>里，零跳转。每张卡片由后端在智能体产出结果时通过一个 SSE 事件推送，
    前端复用现有 timeline / <code>renderInline*</code> 机制渲染成 <code>.rich-card</code>。
    字段名取自真实 Go 结构体与 API 契约。<b>非生产代码</b>，用 setTimeout 模拟数据流。
  </div>
  <div id="stream"></div>
</div>

<script>
const stream = document.getElementById('stream');

function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }
function userMsg(text){ stream.appendChild(el(`<div class="msg user"><div class="msg-body"><div><div class="who" style="text-align:right">客户</div><div class="bubble">${text}</div></div></div><div class="avatar user">🧑</div></div>`)); scroll(); }
function botMsg(html){ const m=el(`<div class="msg assistant"><div class="avatar assistant">🛰️</div><div class="msg-body"><div class="who">安全智能体</div>${html}</div></div>`); stream.appendChild(m); scroll(); return m; }
function scroll(){ window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}); }
function toggle(head){ const b=head.parentElement.querySelector('.rc-body'); if(b) b.classList.toggle('collapsed'); }

/* ============ 1. vuln_card ============ (SSE: vuln_card ; API: GET /api/vulnerabilities[/:id]) */
function vulnCard(v){
  const card = el(`
  <div class="rich-card with-bar rich-card-vuln">
    <div class="sev-bar bar-${v.severity}"></div>
    <div class="rc-main">
      <div class="rc-head" onclick="toggle(this)">
        <span class="badge sev-${v.severity}">${v.severity.toUpperCase()}</span>
        <span class="rc-title">${v.title}</span>
        <span class="badge status-badge">${v.status}</span>
      </div>
      <div class="rc-body">
        <div class="rc-kicker"><span class="sse-tag">SSE vuln_card</span> · 智能体确认漏洞时自动推送</div>
        <div style="margin-top:8px"><span class="chip">🎯 ${v.target}</span> <span class="chip">${v.vulnType}</span> <span class="chip">id ${v.id}</span></div>
        <div class="kv">
          <div class="k">description</div><div>${v.description}</div>
          <div class="k">evidence</div><div><pre class="code">${v.evidence}</pre></div>
          <div class="k">impact</div><div>${v.impact}</div>
          <div class="k">recommendation</div><div>${v.recommendation}</div>
          <div class="k">created_at</div><div class="muted">${v.created_at}</div>
        </div>
        <div class="rc-actions">
          <button class="btn" onclick="navigator.clipboard&&navigator.clipboard.writeText(\`${v.evidence}\`);this.textContent='已复制 ✓'">复制 POC</button>
          <button class="btn admin" title="仅 admin 角色可见；customer 只见卡片">在漏洞库打开</button>
        </div>
      </div>
    </div>
  </div>`);
  return card;
}

/* ============ 2. attack_chain ============ (SSE: attack_chain ; API: GET /api/attack-chain/:cid, POST /regenerate) */
function attackChainCard(chain){
  const card = el(`
  <div class="rich-card rich-card-attack">
    <div class="rc-head" onclick="toggle(this)">
      <span class="rc-kicker">攻击链</span>
      <span class="rc-title">攻击链图 · ${chain.nodes.length} 节点 / ${chain.edges.length} 边</span>
      <span class="chip">conv ${chain.conversationId}</span>
    </div>
    <div class="rc-body">
      <div class="rc-kicker"><span class="sse-tag">SSE attack_chain</span> · 复用现有 Cytoscape 渲染器，内联挂载（不再跳 #attack-chain-container）</div>
      <div id="cy"></div>
      <div class="rc-actions">
        <button class="btn" onclick="const c=document.getElementById('cy');c.classList.toggle('expanded');window._cy&&window._cy.resize()&&window._cy.fit();this.textContent=c.classList.contains('expanded')?'收起':'展开大图'">展开大图</button>
        <button class="btn">重新生成 <span class="muted">(POST /regenerate)</span></button>
      </div>
    </div>
  </div>`);
  return card;
}
function mountCy(chain){
  const colorFor = n => n.type==='target' ? '#4f46e5' : n.type==='vulnerability'
      ? (n.risk_score>=80?'#ef4444':n.risk_score>=60?'#f97316':n.risk_score>=40?'#f59e0b':'#14b8a6')
      : n.type==='exploit' ? '#a855f7' : '#64748b';
  window._cy = cytoscape({
    container: document.getElementById('cy'),
    elements: [
      ...chain.nodes.map(n=>({data:{id:n.id,label:n.label+'\n('+n.type+' · risk '+n.risk_score+')',bg:colorFor(n)}})),
      ...chain.edges.map(e=>({data:{id:e.id,source:e.source,target:e.target,label:e.type}}))
    ],
    style:[
      {selector:'node',style:{'background-color':'data(bg)','label':'data(label)','color':'#e6e8ee',
        'font-size':9,'text-wrap':'wrap','text-valign':'bottom','text-margin-y':4,'width':26,'height':26}},
      {selector:'edge',style:{'width':2,'line-color':'#3a4152','target-arrow-color':'#3a4152',
        'target-arrow-shape':'triangle','curve-style':'bezier','label':'data(label)','font-size':8,'color':'#9aa3b2'}}
    ],
    layout:{name:'breadthfirst',directed:true,padding:16,spacingFactor:1.1}
  });
}

/* ============ 3. hitl_card ============ (SSE in: hitl_interrupt ; action: POST /api/hitl/decision ; SSE out: hitl_resumed/hitl_rejected) */
function hitlCard(h){
  const card = el(`
  <div class="rich-card rich-card-hitl" data-id="${h.interruptId}">
    <div class="rc-head">
      <span class="rc-kicker" style="color:var(--warn)">⚠ 待审批</span>
      <span class="rc-title">危险工具需要人工确认：<b>${h.toolName}</b></span>
      <span class="chip">${h.mode}</span>
    </div>
    <div class="rc-body">
      <div class="rc-kicker"><span class="sse-tag">SSE hitl_interrupt</span> · 复用现有 renderInlineHitlApproval()，统一进 .rich-card 外壳</div>
      <div class="hitl-note">工具参数（${h.mode==='review_edit'?'可编辑后批准':'只读，仅可批准/拒绝'}）：</div>
      <textarea class="args" ${h.mode==='review_edit'?'':'readonly'}>${JSON.stringify(h.arguments,null,2)}</textarea>
      <div class="hitl-note">审批意见（可选）：</div>
      <textarea class="args" style="min-height:44px" placeholder="comment…"></textarea>
      <div class="rc-actions">
        <button class="btn ok" onclick="resolveHitl(this,'approve')">批准执行</button>
        <button class="btn danger" onclick="resolveHitl(this,'reject')">拒绝</button>
      </div>
      <div class="hitl-note">POST /api/hitl/decision → {interruptId, decision, comment, editedArguments?}</div>
    </div>
  </div>`);
  return card;
}
function resolveHitl(btn,decision){
  const card = btn.closest('.rich-card-hitl');
  const head = card.querySelector('.rc-head');
  card.classList.add('resolved');
  head.innerHTML = decision==='approve'
    ? `<span class="rc-kicker" style="color:var(--ok)">✓ 已批准</span><span class="rc-title">${card.querySelector('b').textContent} 已放行执行</span><span class="resolved-tag" style="color:var(--ok)">hitl_resumed</span>`
    : `<span class="rc-kicker" style="color:var(--danger)">✕ 已拒绝</span><span class="rc-title">${card.querySelector('b').textContent} 被拒绝</span><span class="resolved-tag" style="color:var(--danger)">hitl_rejected</span>`;
  card.querySelector('.rc-body').classList.add('collapsed');
}

/* ============ 4. report_card ============ (SSE: report_start/_delta/_done ; API(NEW): POST /api/reports/generate, GET /api/reports/:id/download) */
function reportCard(r){
  const card = el(`
  <div class="rich-card rich-card-report" data-id="${r.reportId}">
    <div class="rc-head" onclick="toggle(this)">
      <span class="rc-kicker">📄 报告</span>
      <span class="rc-title">${r.title} <span class="muted rc-state">（生成中…）</span></span>
    </div>
    <div class="rc-body">
      <div class="rc-kicker"><span class="sse-tag">SSE report_start → report_delta → report_done</span> · POST /api/reports/generate（新后端）</div>
      <div class="report-summary rc-summary" style="display:none"></div>
      <pre class="code report-stream rc-stream"></pre>
      <div class="rc-actions rc-final" style="display:none">
        <button class="btn primary">⬇ 下载 .md <span class="muted">(GET /api/reports/${r.reportId}/download)</span></button>
        <button class="btn" onclick="const s=this.closest('.rc-body').querySelector('.rc-stream');s.style.maxHeight=s.style.maxHeight?'':'none';this.textContent=s.style.maxHeight?'查看全文':'收起'">查看全文</button>
      </div>
    </div>
  </div>`);
  return card;
}
function streamReport(card, chunks, summary){
  const streamEl = card.querySelector('.rc-stream');
  let i=0;
  const iv = setInterval(()=>{
    if(i>=chunks.length){
      clearInterval(iv);
      card.querySelector('.rc-state').textContent = '（已生成）';
      const s = card.querySelector('.rc-summary'); s.style.display='flex';
      s.innerHTML = `<span class="badge sev-critical">高危 ${summary.high}</span>
        <span class="badge sev-medium">中危 ${summary.medium}</span>
        <span class="badge sev-low">低危 ${summary.low}</span>
        <span class="chip">共 ${summary.total} 条</span>`;
      card.querySelector('.rc-final').style.display='flex';
      scroll(); return;
    }
    streamEl.textContent += chunks[i++];
    streamEl.scrollTop = streamEl.scrollHeight;
  }, 220);
}

/* ================= 模拟一段真实对话流 ================= */
const script = [
  () => userMsg('对 10.0.0.5 这台机器做一轮 web 渗透，有问题实时告诉我。'),
  () => botMsg(`<div class="bubble">收到。我先做端口与指纹识别，再针对 8080 上的应用测试注入与鉴权。发现风险会实时弹卡片给你确认。</div>`),

  () => { const m=botMsg(`<div class="bubble">在 <code>8080/tcp</code> 的登录接口发现一个 SQL 注入。已归档为漏洞：</div>`);
    m.querySelector('.msg-body').appendChild(vulnCard({
      id:'a1f3-0091', title:'登录接口 username 参数 SQL 注入', severity:'high', status:'open',
      target:'10.0.0.5:8080', vulnType:'SQL Injection',
      description:'/api/login 的 username 参数未参数化，可通过布尔盲注枚举数据库。',
      evidence:"POST /api/login  username=admin' AND 1=1-- -&password=x   → 200 (登录逻辑短路)",
      impact:'可绕过认证并读取 users 表凭据，横向进入后台。',
      recommendation:'使用预编译语句 / 参数绑定；对登录失败做统一响应，避免布尔差异。',
      created_at:'2026-07-07T14:22:10Z'})); },

  () => { const m=botMsg(`<div class="bubble">下一步我准备用 sqlmap 自动化验证并拖取数据 —— 这是高风险工具，按你的策略需要你确认：</div>`);
    m.querySelector('.msg-body').appendChild(hitlCard({
      interruptId:'hitl_7c2a9f', toolName:'sqlmap', mode:'review_edit',
      arguments:{ url:'http://10.0.0.5:8080/api/login', data:"username=admin&password=x",
        technique:'B', level:2, risk:2, dump:true }})); },

  () => { const m=botMsg(`<div class="bubble">已确认利用路径，画出这一轮的攻击链：</div>`);
    const chain = {
      conversationId:'conv-4471',
      nodes:[
        {id:'n1',type:'target',label:'10.0.0.5:8080',risk_score:0},
        {id:'n2',type:'tool',label:'nmap',risk_score:10},
        {id:'n3',type:'vulnerability',label:'SQLi /api/login',risk_score:85},
        {id:'n4',type:'exploit',label:'sqlmap dump users',risk_score:70},
        {id:'n5',type:'vulnerability',label:'凭据复用 → 后台',risk_score:60}],
      edges:[
        {id:'e1',source:'n1',target:'n2',type:'enables',weight:80},
        {id:'e2',source:'n2',target:'n3',type:'leads_to',weight:90},
        {id:'e3',source:'n3',target:'n4',type:'exploits',weight:85},
        {id:'e4',source:'n4',target:'n5',type:'leads_to',weight:65}]};
    const c = attackChainCard(chain); m.querySelector('.msg-body').appendChild(c);
    setTimeout(()=>mountCy(chain), 60); },

  () => { const m=botMsg(`<div class="bubble">本轮测试完成。为你生成一份完整渗透测试报告：</div>`);
    const c = reportCard({reportId:'rep-8830', title:'10.0.0.5 渗透测试报告'});
    m.querySelector('.msg-body').appendChild(c);
    streamReport(c, [
      '# 渗透测试报告 — 10.0.0.5\n\n',
      '## 执行摘要\n本轮针对 10.0.0.5 的 Web 应用（8080）测试，共发现 ',
      '1 项高危、2 项中危、1 项低危问题。最高风险为登录接口 SQL 注入，',
      '可导致认证绕过与凭据泄露。\n\n',
      '## 发现与证据\n### [高] 登录接口 SQL 注入\n- 目标: 10.0.0.5:8080/api/login\n',
      '- 证据: 布尔盲注 payload 触发登录短路\n- 修复: 参数化查询\n\n',
      '## 修复路线图\n1. 立即：参数化 /api/login\n2. 短期：全站注入审计\n3. 中期：WAF + 统一错误响应\n'
    ], {high:1, medium:2, low:1, total:4}); },

  () => botMsg(`<div class="bubble">报告已就绪，点「下载 .md」保存。需要我把这些漏洞同步到项目看板吗？</div>`)
];

let step=0;
function next(){ if(step<script.length){ script[step++](); setTimeout(next, step<=2?500:1400); } }
next();
</script>
</body>
</html>
